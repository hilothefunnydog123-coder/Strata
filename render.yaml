# Render Blueprint for Ward (Next.js + Prisma/SQLite).
# New + -> Blueprint -> pick this repo. SQLite persists on the mounted disk.
# For scale, switch the datasource to postgresql and set DATABASE_URL to a
# managed Postgres instead of the disk + file URL below.
services:
  - type: web
    name: ward
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    branch: main
    region: oregon
    autoDeploy: true
    healthCheckPath: /
    disk:
      name: ward-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: file:/data/ward.db
      - key: SESSION_SECRET
        generateValue: true
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: OWNER_NAME
        value: Platform Owner
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
