# Ward — one-command self-host (Next.js + Prisma/SQLite).
#
#   SESSION_SECRET=$(openssl rand -hex 32) \
#   OWNER_EMAIL=owner@yourhospital.org OWNER_PASSWORD=change-me \
#   docker compose up --build
#
# Then open http://localhost:3000/         (marketing site)
#            http://localhost:3000/login   (console + owner admin sign-in)
#
# On boot the container applies migrations and seeds the owner + demo org
# (idempotent). SQLite persists on the named volume; for scale, switch the
# Prisma datasource to postgresql and point DATABASE_URL at managed Postgres.
services:
  ward:
    build: .
    image: ward:latest
    ports:
      - "3000:3000"
    environment:
      # SQLite database file on the persistent volume below.
      DATABASE_URL: file:/data/ward.db
      # REQUIRED in production: a long random string signs session cookies.
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET, e.g. openssl rand -hex 32}
      # Platform owner (superadmin) bootstrapped on first boot.
      OWNER_EMAIL: ${OWNER_EMAIL:-owner@ward.health}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-ward-owner}
      OWNER_NAME: ${OWNER_NAME:-Platform Owner}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ward-data:/data
    restart: unless-stopped

volumes:
  ward-data:
