[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "strata-evidence"
version = "0.2.0"
description = "Living evidence intelligence for medicine: define a clinical question once and Strata keeps a graded, continuously-updated systematic review of real PubMed literature — with a dashboard that shows how strong the evidence is and what changed."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "Neil Gilani" }]
keywords = ["medicine", "evidence-based-medicine", "pubmed", "clinical", "research",
            "rag", "citations", "healthcare", "systematic-review", "living-review",
            "evidence-surveillance", "medical-affairs"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Healthcare Industry",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Medical Science Apps.",
]
dependencies = []   # standard library only

[project.scripts]
strata = "strata.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["strata"]
